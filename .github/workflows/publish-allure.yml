name: Publish Allure

on:
  workflow_run:
    workflows:
      - Main Regression
    types:
      - completed

permissions:
  contents: write

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure results artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: allure-results
          path: allure-results

      - name: Checkout gh-pages for Allure history
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/history/. allure-results/history/
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Prepare report timestamp
        run: echo "REPORT_STAMP=$(date -u +'%Y-%m-%d_%H-%M-%S_UTC')" >> "$GITHUB_ENV"

      - name: Deploy latest report to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report

      - name: Deploy archived report to allure-report-history
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: allure-report-history
          publish_dir: ./allure-report
          destination_dir: ${{ env.REPORT_STAMP }}
          keep_files: true
